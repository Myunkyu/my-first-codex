name: PR build chapter 6 artifact

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f -v

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install python-docx matplotlib numpy pillow

      - name: Build DOCX
        shell: bash
        run: |
          set +e
          mkdir -p artifacts
          python scripts/build_quantum_chapter6_collaboration_report.py > artifacts/chapter6_build.log 2>&1
          status=$?
          exit $status

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quantum-chapter6-build-log
          path: artifacts/chapter6_build.log
          if-no-files-found: warn

      - name: Upload DOCX artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: quantum-chapter6-docx
          path: artifacts/arXiv_양자분야_제6장_협업구조분석_고품질_재작성_20260704.docx
          if-no-files-found: error

  report-log:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download build log
        uses: actions/download-artifact@v4
        with:
          name: quantum-chapter6-build-log
          path: log
      - name: Print build log
        run: cat log/chapter6_build.log
