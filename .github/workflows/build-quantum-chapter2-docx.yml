name: Build quantum chapter 2 DOCX

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build_quantum_chapter2_methodology_docx.py'
      - '.github/workflows/build-quantum-chapter2-docx.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f -v

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install python-docx matplotlib pillow

      - name: Build DOCX
        run: python scripts/build_quantum_chapter2_methodology_docx.py

      - name: Commit DOCX
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 'artifacts/arXiv_양자분야_제2장_분석대상_및_방법론_고품질_재작성_20260704.docx'
          git add artifacts/chapter2_assets/*.png
          if git diff --cached --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'Build high-quality chapter 2 methodology Word report'
            git push
          fi
