name: Build quantum chapter 7 DOCX

on:
  push:
    branches: [main]
    paths:
      - 'scripts/build_quantum_chapter7_strategy_report.py'
      - '.github/workflows/build-quantum-chapter7-docx.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f -v

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install python-docx matplotlib numpy pillow

      - name: Build DOCX
        run: python scripts/build_quantum_chapter7_strategy_report.py

      - name: Commit report and figures
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 'artifacts/arXiv_양자분야_제7장_종합인사이트_및_전략적시사점_고품질_재작성_20260704.docx'
          git add artifacts/chapter7_assets/*.png
          if git diff --cached --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'Build high-quality quantum chapter 7 strategy report'
            git push
          fi
